<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash V4 - Ring Pulse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #0F1629 0%, #0A0E1A 50%, #050709 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Pulse rings */
        .rings {
            position: fixed;
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 50%;
            animation: ringPulse 2.5s ease-out infinite;
        }

        .ring:nth-child(1) { width: 150px; height: 150px; animation-delay: 0s; }
        .ring:nth-child(2) { width: 150px; height: 150px; animation-delay: 0.5s; }
        .ring:nth-child(3) { width: 150px; height: 150px; animation-delay: 1s; }

        @keyframes ringPulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            animation: zoomFade 0.8s ease-out 2.8s forwards;
        }

        @keyframes zoomFade {
            to {
                transform: scale(1.1);
                opacity: 0;
            }
        }

        .logo-text {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 44px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* T Logo */
        .t-logo {
            position: relative;
            width: 48px;
            height: 96px;
            margin-right: 5px;
        }

        .t-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 13px;
            background: #10B981;
            border-radius: 2px;
            transform: scaleX(0);
            animation: growX 0.25s ease-out forwards;
        }

        .t-vertical {
            position: absolute;
            top: 13px;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            width: 13px;
            height: 83px;
            background: #10B981;
            border-radius: 2px;
            transform-origin: top;
            animation: growY 0.25s ease-out 0.12s forwards;
        }

        @keyframes growX {
            to { transform: scaleX(1); }
        }

        @keyframes growY {
            to { transform: translateX(-50%) scaleY(1); }
        }

        /* Letters */
        .letter {
            opacity: 0;
            transform: scale(0.5);
            display: inline-block;
        }

        .green { color: #10B981; }
        .white { color: #fff; }

        .letter:nth-child(2) { animation: letterScale 0.3s ease-out 0.3s forwards; }
        .letter:nth-child(3) { animation: letterScale 0.3s ease-out 0.36s forwards; }
        .letter:nth-child(4) { animation: letterScale 0.3s ease-out 0.42s forwards; }
        .letter:nth-child(5) { animation: letterScale 0.3s ease-out 0.48s forwards; }
        .letter:nth-child(6) { animation: letterScale 0.3s ease-out 0.54s forwards; }

        .space { width: 14px; }

        .letter:nth-child(8) { animation: letterScale 0.3s ease-out 0.65s forwards; }
        .letter:nth-child(9) { animation: letterScale 0.3s ease-out 0.71s forwards; }
        .letter:nth-child(10) { animation: letterScale 0.3s ease-out 0.77s forwards; }

        @keyframes letterScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Loading dots */
        .loading {
            margin-top: 40px;
            display: flex;
            gap: 8px;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 0.3s ease-out 1s forwards;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .version {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>
    
    <div class="container">
        <div class="logo-text">
            <div class="t-logo">
                <div class="t-top"></div>
                <div class="t-vertical"></div>
            </div>
            <span class="letter green">I</span>
            <span class="letter green">K</span>
            <span class="letter green">S</span>
            <span class="letter green">A</span>
            <span class="letter green">R</span>
            <span class="space"></span>
            <span class="letter white">V</span>
            <span class="letter white">P</span>
            <span class="letter white">N</span>
        </div>
        
        <div class="loading">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="version">v1.1.1</div>
</body>
</html>
