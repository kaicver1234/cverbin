<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash V5 - Shine Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #0F1629 0%, #0A0E1A 50%, #050709 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            animation: zoomFade 0.8s ease-out 2.8s forwards;
        }

        @keyframes zoomFade {
            to {
                transform: scale(1.1);
                opacity: 0;
            }
        }

        .logo-text {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 50px;
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
        }

        /* Shine effect */
        .logo-text::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.15),
                transparent
            );
            animation: shine 2s ease-in-out 1.2s;
        }

        @keyframes shine {
            to { left: 150%; }
        }

        /* T Logo */
        .t-logo {
            position: relative;
            width: 54px;
            height: 108px;
            margin-right: 6px;
        }

        .t-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 15px;
            background: linear-gradient(90deg, #10B981, #22c55e);
            border-radius: 3px;
            transform: scaleX(0);
            animation: growX 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .t-vertical {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            width: 15px;
            height: 93px;
            background: linear-gradient(180deg, #22c55e, #10B981);
            border-radius: 3px;
            transform-origin: top;
            animation: growY 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
        }

        @keyframes growX {
            to { transform: scaleX(1); }
        }

        @keyframes growY {
            to { transform: translateX(-50%) scaleY(1); }
        }

        /* Letters */
        .letter {
            opacity: 0;
            transform: translateX(-20px);
            display: inline-block;
        }

        .green { color: #10B981; }
        .white { color: #fff; }

        .letter:nth-child(2) { animation: letterSlideX 0.35s ease-out 0.45s forwards; }
        .letter:nth-child(3) { animation: letterSlideX 0.35s ease-out 0.5s forwards; }
        .letter:nth-child(4) { animation: letterSlideX 0.35s ease-out 0.55s forwards; }
        .letter:nth-child(5) { animation: letterSlideX 0.35s ease-out 0.6s forwards; }
        .letter:nth-child(6) { animation: letterSlideX 0.35s ease-out 0.65s forwards; }

        .space { width: 16px; }

        .letter:nth-child(8) { animation: letterSlideX 0.35s ease-out 0.75s forwards; }
        .letter:nth-child(9) { animation: letterSlideX 0.35s ease-out 0.8s forwards; }
        .letter:nth-child(10) { animation: letterSlideX 0.35s ease-out 0.85s forwards; }

        @keyframes letterSlideX {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Secure badge */
        .badge {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 30px;
            opacity: 0;
            animation: fadeIn 0.4s ease-out 1.1s forwards;
        }

        .badge-icon {
            font-size: 14px;
        }

        .badge-text {
            color: #10B981;
            font-size: 12px;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .version {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-text">
            <div class="t-logo">
                <div class="t-top"></div>
                <div class="t-vertical"></div>
            </div>
            <span class="letter green">I</span>
            <span class="letter green">K</span>
            <span class="letter green">S</span>
            <span class="letter green">A</span>
            <span class="letter green">R</span>
            <span class="space"></span>
            <span class="letter white">V</span>
            <span class="letter white">P</span>
            <span class="letter white">N</span>
        </div>
        
        <div class="badge">
            <span class="badge-icon">🔒</span>
            <span class="badge-text">ENCRYPTED CONNECTION</span>
        </div>
    </div>

    <div class="version">v1.1.1</div>
</body>
</html>
