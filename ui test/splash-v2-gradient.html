<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash V2 - Gradient Sweep</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #0F1629 0%, #0A0E1A 50%, #050709 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: zoomFade 0.8s ease-out 2.8s forwards;
        }

        @keyframes zoomFade {
            to {
                transform: scale(1.15);
                opacity: 0;
            }
        }

        .logo-text {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* T Logo with gradient */
        .t-logo {
            position: relative;
            width: 52px;
            height: 104px;
            margin-right: 6px;
        }

        .t-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 15px;
            background: linear-gradient(90deg, #10B981, #06b6d4);
            border-radius: 3px;
            transform: scaleX(0);
            animation: growX 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .t-vertical {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            width: 15px;
            height: 89px;
            background: linear-gradient(180deg, #06b6d4, #10B981);
            border-radius: 3px;
            transform-origin: top;
            animation: growY 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
        }

        @keyframes growX {
            to { transform: scaleX(1); }
        }

        @keyframes growY {
            to { transform: translateX(-50%) scaleY(1); }
        }

        /* Letters with gradient text */
        .letter {
            opacity: 0;
            transform: translateY(50px) scale(0.8);
            display: inline-block;
        }

        .tiksar {
            background: linear-gradient(135deg, #10B981 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .vpn {
            color: #fff;
        }

        .letter:nth-child(2) { animation: letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards; }
        .letter:nth-child(3) { animation: letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.48s forwards; }
        .letter:nth-child(4) { animation: letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.56s forwards; }
        .letter:nth-child(5) { animation: letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.64s forwards; }
        .letter:nth-child(6) { animation: letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.72s forwards; }

        .space { width: 18px; }

        .letter:nth-child(8) { animation: letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.85s forwards; }
        .letter:nth-child(9) { animation: letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.93s forwards; }
        .letter:nth-child(10) { animation: letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 1.01s forwards; }

        @keyframes letterPop {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Animated gradient line */
        .gradient-line {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #10B981, #06b6d4, #6366f1);
            border-radius: 10px;
            animation: lineGrow 1.5s ease-out 1.2s forwards;
        }

        @keyframes lineGrow {
            to { width: 200px; }
        }

        .version {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-text">
            <div class="t-logo">
                <div class="t-top"></div>
                <div class="t-vertical"></div>
            </div>
            <span class="letter tiksar">I</span>
            <span class="letter tiksar">K</span>
            <span class="letter tiksar">S</span>
            <span class="letter tiksar">A</span>
            <span class="letter tiksar">R</span>
            <span class="space"></span>
            <span class="letter vpn">V</span>
            <span class="letter vpn">P</span>
            <span class="letter vpn">N</span>
        </div>
    </div>

    <div class="gradient-line"></div>
    <div class="version">v1.1.1</div>
</body>
</html>
