<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Splash V3 - Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Mobile frame */
        .mobile-frame {
            width: 375px;
            height: 812px;
            background: linear-gradient(180deg, #0F1629 0%, #0A0E1A 50%, #050709 100%);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 0 12px #1a1a1a,
                0 0 0 14px #333,
                0 30px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
        }

        /* Particles */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 3s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-150px) scale(1); }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            animation: zoomFade 0.8s ease-out 2.8s forwards;
        }

        /* Glow behind logo */
        .logo-glow {
            position: absolute;
            width: 280px;
            height: 150px;
            background: radial-gradient(ellipse, rgba(251, 191, 36, 0.25) 0%, rgba(251, 191, 36, 0.1) 40%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(20px);
            animation: glowPulse 2s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes zoomFade {
            to {
                transform: scale(1.1);
                opacity: 0;
            }
        }

        .logo-text {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 1px;
            position: relative;
            z-index: 2;
        }

        /* Shine effect */
        .logo-text::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -100%;
            width: 60%;
            height: 120%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                rgba(251, 191, 36, 0.4),
                rgba(255, 255, 255, 0.6),
                rgba(251, 191, 36, 0.4),
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: skewX(-20deg);
            animation: shine 2s ease-in-out 1.3s;
            filter: blur(2px);
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 180%; }
        }

        /* T Logo */
        .t-logo {
            position: relative;
            width: 44px;
            height: 88px;
            margin-right: 4px;
        }

        .t-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, #fff, #fbbf24);
            border-radius: 2px;
            transform: scaleX(0);
            animation: growX 0.3s ease-out forwards;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .t-vertical {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            width: 12px;
            height: 76px;
            background: linear-gradient(180deg, #fbbf24, #f59e0b);
            border-radius: 2px;
            transform-origin: top;
            animation: growY 0.3s ease-out 0.15s forwards;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        @keyframes growX {
            to { transform: scaleX(1); }
        }

        @keyframes growY {
            to { transform: translateX(-50%) scaleY(1); }
        }

        /* Letters */
        .letter {
            opacity: 0;
            transform: translateY(30px);
            display: inline-block;
        }

        .tiksar { 
            color: #fff; 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        .vpn { 
            color: #fbbf24;
            text-shadow: 0 0 25px rgba(251, 191, 36, 0.5);
        }

        .letter:nth-child(2) { animation: letterSlide 0.35s ease-out 0.35s forwards; }
        .letter:nth-child(3) { animation: letterSlide 0.35s ease-out 0.42s forwards; }
        .letter:nth-child(4) { animation: letterSlide 0.35s ease-out 0.49s forwards; }
        .letter:nth-child(5) { animation: letterSlide 0.35s ease-out 0.56s forwards; }
        .letter:nth-child(6) { animation: letterSlide 0.35s ease-out 0.63s forwards; }

        .space { width: 12px; }

        .letter:nth-child(8) { animation: letterSlide 0.35s ease-out 0.75s forwards; }
        .letter:nth-child(9) { animation: letterSlide 0.35s ease-out 0.82s forwards; }
        .letter:nth-child(10) { animation: letterSlide 0.35s ease-out 0.89s forwards; }

        @keyframes letterSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tagline */
        .tagline {
            margin-top: 20px;
            color: rgba(251, 191, 36, 0.6);
            font-size: 12px;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 1.2s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .version {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
        }

        /* Home indicator */
        .home-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="notch"></div>
        <div class="particles" id="particles"></div>
        
        <div class="container">
            <div class="logo-glow"></div>
            <div class="logo-text">
                <div class="t-logo">
                    <div class="t-top"></div>
                    <div class="t-vertical"></div>
                </div>
                <span class="letter tiksar">I</span>
                <span class="letter tiksar">K</span>
                <span class="letter tiksar">S</span>
                <span class="letter tiksar">A</span>
                <span class="letter tiksar">R</span>
                <span class="space"></span>
                <span class="letter vpn">V</span>
                <span class="letter vpn">P</span>
                <span class="letter vpn">N</span>
            </div>
            <p class="tagline">SECURE • FAST • FREE</p>
        </div>

        <div class="version">v1.1.1</div>
        <div class="home-indicator"></div>
    </div>

    <script>
        const container = document.getElementById('particles');
        const colors = ['#fbbf24', '#f59e0b', '#fff'];
        
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = (10 + Math.random() * 80) + '%';
            p.style.bottom = (20 + Math.random() * 20) + '%';
            p.style.animationDelay = (Math.random() * 3) + 's';
            p.style.animationDuration = (2.5 + Math.random() * 1.5) + 's';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.width = (3 + Math.random() * 4) + 'px';
            p.style.height = p.style.width;
            container.appendChild(p);
        }
    </script>
</body>
</html>
