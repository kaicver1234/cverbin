name: Build and Release APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for (e.g., v1.1.2)'
        required: true
        default: 'v1.1.2'

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Keystore (if available)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "🔑 Decoding keystore..."
            echo "$KEYSTORE_BASE64" | base64 -d > android/my-release-key.jks
            
            echo "📝 Creating key.properties..."
            echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
            echo "keyAlias=$KEY_ALIAS" >> android/key.properties
            echo "storeFile=my-release-key.jks" >> android/key.properties
            
            echo "✅ Keystore configured successfully"
            ls -la android/my-release-key.jks
            cat android/key.properties
          else
            echo "⚠️ No keystore secrets found, will use debug signing"
          fi
        shell: bash

      - name: Check Signing Status
        run: |
          if [ -f "android/my-release-key.jks" ]; then
            echo "✅ Building with RELEASE keystore (No Play Protect warning)"
            echo "SIGNING_TYPE=release" >> $GITHUB_ENV
          else
            echo "⚠️ Building with DEBUG keystore (Will show Play Protect warning)"
            echo "SIGNING_TYPE=debug" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build split APKs
        run: flutter build apk --split-per-abi --release

      - name: Rename APKs
        run: |
          mkdir -p release
          copy build\app\outputs\flutter-apk\app-release.apk release\TiksarVPN-universal.apk
          copy build\app\outputs\flutter-apk\app-armeabi-v7a-release.apk release\TiksarVPN-armeabi-v7a.apk
          copy build\app\outputs\flutter-apk\app-arm64-v8a-release.apk release\TiksarVPN-arm64-v8a.apk
          copy build\app\outputs\flutter-apk\app-x86_64-release.apk release\TiksarVPN-x86_64.apk
        shell: cmd

      - name: Get tag name
        id: get_tag
        run: |
          if [[ $GITHUB_EVENT_NAME == 'workflow_dispatch' ]]; then
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Create or Update Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: |
            release/TiksarVPN-universal.apk
            release/TiksarVPN-armeabi-v7a.apk
            release/TiksarVPN-arm64-v8a.apk
            release/TiksarVPN-x86_64.apk
          body: |
            ## Installation
            
            **Signing Status:** ${{ env.SIGNING_TYPE == 'release' && '✅ Release Signed (No Play Protect warning)' || '⚠️ Debug Signed (May show Play Protect warning)' }}
            
            ### Download
            
            | Architecture | Download Link |
            |-------------|---------------|
            | Universal   | <a href="https://github.com/code3-dev/Tiksar-vpn/releases/latest/download/TiksarVPN-universal.apk"><img src="https://img.shields.io/badge/Android-Universal-3DDC84?style=for-the-badge&logo=android&logoColor=white" alt="Android Universal"></a> |
            | armeabi-v7a | <a href="https://github.com/code3-dev/Tiksar-vpn/releases/latest/download/TiksarVPN-armeabi-v7a.apk"><img src="https://img.shields.io/badge/Android-armeabi--v7a-3DDC84?style=for-the-badge&logo=android&logoColor=white" alt="Android armeabi-v7a"></a> |
            | arm64-v8a   | <a href="https://github.com/code3-dev/Tiksar-vpn/releases/latest/download/TiksarVPN-arm64-v8a.apk"><img src="https://img.shields.io/badge/Android-arm64--v8a-3DDC84?style=for-the-badge&logo=android&logoColor=white" alt="Android arm64-v8a"></a> |
            | x86_64      | <a href="https://github.com/code3-dev/Tiksar-vpn/releases/latest/download/TiksarVPN-x86_64.apk"><img src="https://img.shields.io/badge/Android-x86_64-3DDC84?style=for-the-badge&logo=android&logoColor=white" alt="Android x86_64"></a> |
