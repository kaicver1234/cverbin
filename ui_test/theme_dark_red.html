<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Red Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .phone-frame {
            width: 375px;
            height: 812px;
            background: #1a1a1a;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            background: #050505;
        }
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #1a1a1a;
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #050505;
        }
        .bottom-bloom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, 
                rgba(30, 3, 8, 0.55) 0%,
                rgba(36, 4, 10, 0.45) 10%,
                rgba(42, 5, 12, 0.36) 20%,
                rgba(48, 6, 14, 0.28) 30%,
                rgba(54, 7, 16, 0.20) 40%,
                rgba(60, 8, 18, 0.12) 50%,
                rgba(66, 9, 20, 0.06) 60%,
                rgba(72, 10, 22, 0.03) 70%,
                transparent 80%);
        }
        .center-fade {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, 
                transparent 0%,
                transparent 40%,
                rgba(5, 5, 5, 0.4) 50%,
                rgba(5, 5, 5, 0.75) 60%,
                rgba(5, 5, 5, 0.92) 70%,
                rgba(5, 5, 5, 1) 80%,
                rgba(5, 5, 5, 1) 100%);
        }
        .top-dim {
            position: absolute;
            top: 0;
            width: 100%;
            height: 50%;
            background: #050505;
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        .app-name {
            color: #fff;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
        }
        .app-name span {
            color: #ef4444;
        }
        .power-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, 
                rgba(239, 68, 68, 0.3) 0%,
                rgba(239, 68, 68, 0.2) 100%);
            border: 2px solid rgba(239, 68, 68, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px auto;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.3);
        }
        .power-icon {
            width: 50px;
            height: 50px;
            border: 4px solid #fff;
            border-radius: 50%;
            position: relative;
        }
        .power-icon::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 20px;
            background: #fff;
        }
        .status {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }
        .label {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ef4444;
            font-size: 12px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-screen">
            <div class="notch"></div>
            <div class="background"></div>
            <div class="bottom-bloom"></div>
            <div class="center-fade"></div>
            <div class="top-dim"></div>
            
            <div class="content">
                <div class="app-name">Tiksar<span>VPN</span></div>
                <div class="power-button">
                    <div class="power-icon"></div>
                </div>
                <div class="status">Tap to Connect</div>
            </div>
            
            <div class="label">Dark Red 🔥</div>
        </div>
    </div>
</body>
</html>
